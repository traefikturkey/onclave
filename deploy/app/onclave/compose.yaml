name: onclave

services:
  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?}
      RABBITMQ_DEFAULT_VHOST: onclave
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  onclave-core:
    image: ${ONCLAVE_CORE_IMAGE_REPOSITORY:?}:${ONCLAVE_CORE_IMAGE_TAG:?}@${ONCLAVE_CORE_IMAGE_DIGEST:?}
    restart: unless-stopped
    environment:
      ONCLAVE_AMQP_URL: amqp://${RABBITMQ_DEFAULT_USER:?}:${RABBITMQ_DEFAULT_PASS:?}@rabbitmq:5672/onclave
      ONCLAVE_HTTP_PORT: "8080"
      ONCLAVE_QUEUE_TTL_MS: ${ONCLAVE_QUEUE_TTL_MS:-604800000}
      ONCLAVE_QUEUE_MAX_LENGTH: ${ONCLAVE_QUEUE_MAX_LENGTH:-1000}
      ONCLAVE_HEARTBEAT_STALE_MS: ${ONCLAVE_HEARTBEAT_STALE_MS:-90000}
      ONCLAVE_MAX_EXCHANGES: ${ONCLAVE_MAX_EXCHANGES:-16}
      ONCLAVE_MAX_TOTAL_TOKENS: ${ONCLAVE_MAX_TOTAL_TOKENS:-200000}
    ports:
      - "8080:8080"
    volumes:
      - onclave-data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  rabbitmq-data:
  onclave-data:
