name: menos

services:
  postgres:
    image: ${POSTGRES_IMAGE:?}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-menos}
      POSTGRES_USER: ${POSTGRES_USER:-menos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio:
    image: ${MINIO_IMAGE:?}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  ollama:
    image: ${OLLAMA_IMAGE:?}
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  searxng:
    image: ${SEARXNG_IMAGE:?}
    restart: unless-stopped
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:?}
      GRANIAN_HOST: 0.0.0.0
    ports:
      - "8888:8080"

  docling-serve:
    image: ${DOCLING_IMAGE:?}
    restart: unless-stopped
    environment:
      DOCLING_SERVE_ENABLE_UI: "0"
    ports:
      - "5001:5001"

  menos-api:
    image: ${MENOS_API_IMAGE:?}
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-menos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-menos}
      S3_ENDPOINT_URL: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?}
      S3_BUCKET: ${S3_BUCKET:-menos}
      S3_REGION: ${S3_REGION:-us-east-1}
      OLLAMA_URL: http://ollama:11434
      SEARXNG_URL: http://searxng:8080
      DOCLING_URL: http://docling-serve:5001
      SSH_PUBLIC_KEYS_PATH: /keys/authorized_keys
      WEBSHARE_PROXY_USERNAME: ${WEBSHARE_PROXY_USERNAME:?}
      WEBSHARE_PROXY_PASSWORD: ${WEBSHARE_PROXY_PASSWORD:?}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:?}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CALLBACK_URL: ${CALLBACK_URL:-}
      CALLBACK_SECRET: ${CALLBACK_SECRET:-}
    ports:
      - "8000:8000"
    configs:
      - source: authorized_keys
        target: /keys/authorized_keys
        mode: 0444
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      ollama:
        condition: service_started
      searxng:
        condition: service_started
      docling-serve:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

configs:
  authorized_keys:
    file: ${MENOS_AUTHORIZED_KEYS_FILE:?}

volumes:
  postgres-data:
  minio-data:
  ollama-data:
