services:
  ansible:
    build:
      context: .
      dockerfile: Dockerfile
    user: root
    volumes:
      # Mount SSH keys to temp location (entrypoint copies with correct perms)
      - ${HOME:-${USERPROFILE}}/.ssh:/mnt/ssh:ro
      # Mount ansible playbooks and config
      - ./:/ansible:rw
      # Mount repo root for access to scripts/ and the core build context
      - ../..:/project:ro
      # Mount site-specific values from the ignored nested repository
      - ../../values:/values:ro
      # Mount git modules (for when this repo is a dotfiles submodule)
      - ../../../.git/modules:/.git/modules:ro
    working_dir: /ansible
    environment:
      - ANSIBLE_CONFIG=/ansible/ansible.cfg
      - ANSIBLE_HOST_KEY_CHECKING=False
      # Bitwarden bootstrap token; server and project settings come from values.
      - BITWARDEN_ACCESS_KEY
    stdin_open: true
    tty: true
    network_mode: host
