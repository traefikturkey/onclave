# Secrets come from Bitwarden Secrets Manager via a machine account access
# token. Provide these on the host shell (loaded from
# ~/.dotfiles/private/secrets.env); the harness passes them through:
#   BITWARDEN_ACCESS_KEY      - machine account access token
#   BITWARDEN_API_SERVER      - e.g. https://vault.bitwarden.com/api
#   BITWARDEN_IDENTITY_SERVER - e.g. https://vault.bitwarden.com/identity
#   ONCLAVE_BWS_PROJECT_ID    - optional project scope for bws secret list
# Required secrets (by key name): RABBITMQ_DEFAULT_USER, RABBITMQ_DEFAULT_PASS.
