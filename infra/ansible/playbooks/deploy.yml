---
- name: Deploy onclave stack
  hosts: onclave
  become: true

  tasks:
    # --- Bitwarden Secrets Manager preflight ---
    - name: Validate Bitwarden access configuration
      ansible.builtin.assert:
        that:
          - lookup('env', 'BITWARDEN_ACCESS_KEY') | length > 0
          - bws_project_id | length > 0
          - onclave_secrets_required_keys | length > 0
        fail_msg: >-
          Bitwarden preflight failed. Export BITWARDEN_ACCESS_KEY (and
          BITWARDEN_API_SERVER for self-hosted) in the host shell; they are
          loaded from ~/.dotfiles/private/secrets.env and passed through to
          the harness container.
      delegate_to: localhost
      become: false
      tags: [preflight]

    - name: Create local onclave secret temp directory
      ansible.builtin.file:
        path: "{{ onclave_secrets_tmp_dir }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false
      check_mode: false
      no_log: true
      diff: false
      tags: [preflight]

    - name: Validate onclave runtime secrets from Bitwarden
      ansible.builtin.command:
        cmd: >-
          python3 /project/scripts/onclave-bws-env.py
          --stack onclave
          --project-id {{ bws_project_id }}
          --api-server {{ bws_api_server }}
          --validate
      delegate_to: localhost
      become: false
      register: onclave_bws_validate
      changed_when: false
      check_mode: false
      no_log: true
      diff: false
      tags: [preflight]

    - name: Render onclave runtime env from Bitwarden
      ansible.builtin.command:
        cmd: >-
          python3 /project/scripts/onclave-bws-env.py
          --stack onclave
          --project-id {{ bws_project_id }}
          --api-server {{ bws_api_server }}
          --out {{ onclave_secrets_tmp_dir }}/onclave.env
          --write
      delegate_to: localhost
      become: false
      register: onclave_bws_render
      changed_when: false
      check_mode: false
      no_log: true
      diff: false
      tags: [preflight]

    - name: Add immutable core image coordinates
      ansible.builtin.blockinfile:
        path: "{{ onclave_secrets_tmp_dir }}/onclave.env"
        marker: "# {mark} IMAGE COORDINATES"
        block: |
          ONCLAVE_CORE_IMAGE_REPOSITORY={{ onclave_core_image_repository }}
          ONCLAVE_CORE_IMAGE_TAG={{ onclave_core_image_tag }}
          ONCLAVE_CORE_IMAGE_DIGEST={{ onclave_core_image_digest }}
      delegate_to: localhost
      become: false
      no_log: true
      diff: false
      tags: [preflight]

    # --- Git state checks ---
    - name: Configure git for container environment
      ansible.builtin.command:
        argv:
          - git
          - config
          - --global
          - "{{ item.name }}"
          - "{{ item.value }}"
      loop:
        - name: safe.directory
          value: /project
        - name: core.autocrlf
          value: input
      delegate_to: localhost
      changed_when: false

    - name: Detect git directory (handles submodules)
      ansible.builtin.shell: |
        set -o pipefail
        cd /project
        if [ -f .git ]; then
          gitdir=$(sed 's/gitdir: //' .git)
          echo "/project/$gitdir"
        else
          echo "/project/.git"
        fi
      args:
        executable: /bin/bash
      delegate_to: localhost
      register: git_dir_result
      changed_when: false

    - name: Get local git SHA
      ansible.builtin.command:
        argv:
          - git
          - "--git-dir={{ git_dir_result.stdout }}"
          - --work-tree=/project
          - rev-parse
          - HEAD
      delegate_to: localhost
      register: local_git_sha
      changed_when: false

    - name: Get local git branch
      ansible.builtin.command:
        argv:
          - git
          - "--git-dir={{ git_dir_result.stdout }}"
          - --work-tree=/project
          - rev-parse
          - --abbrev-ref
          - HEAD
      delegate_to: localhost
      register: local_git_branch
      changed_when: false

    - name: Check for uncommitted changes
      ansible.builtin.command:
        argv:
          - git
          - "--git-dir={{ git_dir_result.stdout }}"
          - --work-tree=/project
          - status
          - --porcelain
      delegate_to: localhost
      register: git_status
      changed_when: false
      failed_when: git_status.stdout != ""

    - name: Display deploy info
      ansible.builtin.debug:
        msg: "Deploying {{ local_git_sha.stdout[:8] }} ({{ local_git_branch.stdout }}) to {{ ansible_host }}"

    # --- Target layout ---
    - name: Create deploy directory
      ansible.builtin.file:
        path: "{{ deploy_path }}"
        state: directory
        mode: "0755"

    - name: Sync app definition
      ansible.builtin.copy:
        src: /project/deploy/app/onclave/compose.yaml
        dest: "{{ deploy_path }}/docker-compose.yml"
        mode: "0644"

    # --- Runtime env ---
    - name: Check existing runtime env
      ansible.builtin.stat:
        path: "{{ deploy_path }}/.env"
      register: onclave_existing_env

    - name: Backup existing runtime env
      ansible.builtin.copy:
        src: "{{ deploy_path }}/.env"
        dest: "{{ deploy_path }}/.env.bak"
        remote_src: true
        mode: "0600"
      when: onclave_existing_env.stat.exists
      no_log: true
      diff: false

    - name: Install Bitwarden-rendered runtime env atomically
      ansible.builtin.copy:
        src: "{{ onclave_secrets_tmp_dir }}/onclave.env"
        dest: "{{ deploy_path }}/.env"
        mode: "{{ onclave_secrets_runtime_env_mode }}"
      no_log: true
      diff: false

    # --- Compose actions ---
    - name: Validate compose interpolation before compose actions
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.yml config
        chdir: "{{ deploy_path }}"
      changed_when: false
      check_mode: false
      tags: [preflight]

    - name: Pull container images
      ansible.builtin.command:
        cmd: docker compose pull rabbitmq onclave-core
        chdir: "{{ deploy_path }}"
      changed_when: true

    - name: Start services
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ deploy_path }}"
      changed_when: true

    - name: Show service status
      ansible.builtin.command:
        cmd: docker compose ps
        chdir: "{{ deploy_path }}"
      register: compose_status
      changed_when: false

    - name: Display status
      ansible.builtin.debug:
        var: compose_status.stdout_lines

    # --- Post-deploy verification ---
    - name: Verify core health and broker connectivity
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:8080/health"
        return_content: true
      register: post_deploy_health
      retries: 10
      delay: 3
      until:
        - post_deploy_health.status == 200
        - post_deploy_health.json.broker.connected | default(false)
      changed_when: false

    - name: Confirm broker connectivity
      ansible.builtin.assert:
        that:
          - post_deploy_health.json.broker.connected
          - post_deploy_health.json.broker.topologyDeclared
        success_msg: "Deploy verified: core connected to broker on {{ ansible_host }}"
        fail_msg: "Deploy verification failed: core is not connected to the broker"

    - name: Remove local rendered onclave env
      ansible.builtin.file:
        path: "{{ onclave_secrets_tmp_dir }}"
        state: absent
      delegate_to: localhost
      become: false
      no_log: true
      diff: false
      tags: [preflight]
