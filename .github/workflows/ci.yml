name: ci

on:
  push:
    branches: [main, "feature/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:4-management
        env:
          RABBITMQ_DEFAULT_USER: onclave
          RABBITMQ_DEFAULT_PASS: onclave-test
          RABBITMQ_DEFAULT_VHOST: onclave
        ports:
          - 5673:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 12
    steps:
      - uses: actions/checkout@v7
      - name: public safety
        run: python scripts/public-safety.py
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - name: integration tests
        env:
          ONCLAVE_TEST_AMQP_URL: amqp://onclave:onclave-test@localhost:5673/onclave
        run: pnpm exec vitest run --config vitest.integration.config.ts

  core-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/onclave-core
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish onclave-core image
        id: core-image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/core/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Report immutable image reference
        if: github.event_name == 'push'
        run: echo "${IMAGE_NAME}:${GITHUB_SHA}@${{ steps.core-image.outputs.digest }}"
